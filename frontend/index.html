<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогулки на лошадях</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay">

    <div class="booking-card">

        <h1>🐎 Прогулки на лошадях</h1>

        <form id="booking-form">

            <input
                type="text"
                id="client_name"
                placeholder="Ваше имя"
                required
            >

            <input
                type="tel"
                id="phone"
                placeholder="Телефон"
                required
            >

            <select id="gender">
                <option value="male">Мужчина</option>
                <option value="female">Женщина</option>
            </select>

            <input
                type="number"
                id="people_count"
                min="1"
                max="15"
                value="1"
            >

            <select id="duration">
                <option value="1">1 час</option>
                <option value="2">2 часа</option>
            </select>

            <select id="booking_time">
                <option>Загрузка...</option>
            </select>

            <button type="submit">
                Записаться
            </button>

        </form>

        <div id="result"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
