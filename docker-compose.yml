services:

  db:
    image: postgres:16

  backend:
    build: .

  nginx:
    image: nginx:alpine

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

      - ./certbot/www:/var/www/certbot

      - ./certbot/conf:/etc/letsencrypt

    depends_on:
      - backend

  certbot:
    image: certbot/certbot

    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt